name: E2E Maestro Android

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e-maestro-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install dependencies
        run: npm ci

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Generate Android native project
        run: npx expo prebuild --platform android --non-interactive --no-install

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Run Maestro on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          disable-animations: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          script: |
            set -euo pipefail

            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            adb reverse tcp:8081 tcp:8081

            npx expo start --dev-client --port 8081 --non-interactive > /tmp/expo.log 2>&1 &
            EXPO_PID=$!
            trap 'kill $EXPO_PID || true' EXIT

            for i in {1..60}; do
              if curl -fsS "http://127.0.0.1:8081/status" >/dev/null; then
                break
              fi
              sleep 2
            done

            maestro test .maestro/flows --env APP_ID=com.kako351.pokedex.android
